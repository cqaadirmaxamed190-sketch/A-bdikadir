<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2 class="h2">Registration form</h2>
    </header>
    <nav>
        <a href="index.html">Home</a>&nbsp;&nbsp;
        <a href="team.html">Team</a>&nbsp;&nbsp;
        <a href="registration.html">Register</a>&nbsp;&nbsp;
        <a href="contact.html">Contact</a>&nbsp;&nbsp;
    </nav>
    <form action="">
        <legend>foomka is-diiwaangelinta</legend>
        <p>
            <label for="first name">First Name:</label><br>
            <input type="text" placeholder="Enter first name">
        </p>
        <p>
            <label for="middle name">Middel Name:</label><br>
            <input type="text" placeholder="Enter middle name">
        </p>
        <p>
            <label for="last name">Last Name:</label><br>
            <input type="text" placeholder="Enter last name">
        </p>
        <p>
            <label for="email">Email Address:</label><br>
            <input type="email" placeholder="Enter email">
        </p>
        <p>
            <label for="password">Password:</label><br>
            <input type="password" placeholder="Enter Password">
        </p>
        <p>
            <label for="mobile">Mobile:</label>
            <input type="tel" placeholder="+252 610000000">
        </p>
        <p>
            <label for="gender">Choose your gender:</label><br>
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label><br>
            <input type="radio" name="gender" id="female">
            <label for="female">Female</label><br>
            <input type="radio" name="gender" id="khuntha">
            <label for="khuntha">Khuntha</label><br>
        </p>
        <p>
            <label for="">Choose your Date of Birth</label><br>
            <input type="date">
        </p>
        <p>
            <label for="">Choose your Skills:</label><br>
            <input type="checkbox">
            <label for="checkbox">HTML</label><br>
            <input type="checkbox">
            <label for="checkbox">CSS</label><br>
            <input type="checkbox">
            <label for="checkbox">Javascript</label><br>
        </p>
        <p>
            <label for="">Choose your Country:</label><br>
            <select>
                <option value="soomalia">Soomalia</option>
                <option value="kenya">Kenya</option>
                <option value="ethiopia">Ethiopia</option>
                <option value="spain">Spain</option>
                <option value="belgium">Belgium</option>
                <option value="swedan">Swedan</option>
                <option value="egypt">Egypt</option>
            </select>
        </p>
        <p>
            <label for="">Choose your Hobbies:</label><br>
            <input type="checkbox">
            <label for="checkbox">Reading</label><br>
            <input type="checkbox">
            <label for="checkbox">Sports</label><br>
            <input type="checkbox">
            <label for="checkbox">Swimming</label><br>
            <input type="checkbox">
            <label for="checkbox">Traveling</label><br>
        </p>
        <p>
            <input type="submit" value="Register">&nbsp;&nbsp;
            <input type="reset" value="Reset">&nbsp;&nbsp;
        </p>
    </form>
</body>
</html>
